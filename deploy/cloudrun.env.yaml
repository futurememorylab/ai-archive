# Non-secret prod config for Cloud Run (gcloud run deploy --env-vars-file).
# Secrets (CATDV_PASSWORD, GEMINI_API_KEY, WG_PRIVATE_KEY) are
# injected via --set-secrets in .github/workflows/deploy.yml -- never here.
# All values must be YAML strings.
APP_ENV: "prod"
DATA_DIR: "/data"
# Per-deployment identifier (mandatory; issue #55). Namespaces
# uploaded-clip GCS keys so prod never collides with staging/local in the
# shared catdv-proxies bucket. Must be unique per Cloud Run service.
INSTANCE_ID: "prod"
# Flipped to "false" in phase 3 when the WireGuard tunnel lands.
CATDV_OFFLINE: "false"
# Manual connect-on-demand: boot disconnected (no seat); the operator
# clicks Connect to spend a seat and Disconnect to release it. See ADR 0068.
CATDV_CONNECT_MODE: "manual"
# CatDV is reached through the onetun local forward (phase 3).
CATDV_BASE_URL: "http://127.0.0.1:18080"
CATDV_USERNAME: "klientAI"
CATDV_CATALOG_ID: "881507"
GCP_PROJECT_ID: "catdav"
# Matches the working local .env -- Gemini model availability is
# region-bound; do not change as part of deployment.
GCP_LOCATION: "global"
GCS_BUCKET_NAME: "catdav-proxies"
ARCHIVE_PROVIDER: "catdv"
AI_INPUT_STORE: "gcs"
# Phase 2: SQLite persistence. DB_PATH must equal
# settings.data_dir / "app.db" (context.py:129).
DB_PATH: "/data/app.db"
LITESTREAM_REPLICA_URL: "gcs://catdv-annotator-db/litestream"
# WireGuard / onetun config. WG_* and ONETUN_MTU are read by the app's
# Settings and used by the in-app VpnSupervisor (entrypoint no longer runs
# onetun — see ADR 0075). WG_PRIVATE_KEY is the matching secret (wg-private-key).
# NOTE: this reuses an existing personal peer key, so the cloud tunnel and that
# Mac's tunnel cannot be up at the same time (one endpoint per peer key). A
# dedicated least-privilege cloud peer (AllowedIPs=192.168.1.41/32) is the
# eventual hardening — see deploy/README.md.
WG_ENDPOINT: "gw.pragafilm.cz:51820"
WG_PEER_PUBKEY: "ZM3v8CC14zaPnwuHDsXM/hGifyof4vPEVqsfgdMFSEs="
WG_SOURCE_IP: "192.168.3.5"
# onetun tunnel MTU. The binding constraint is the Cloud Run -> gw.pragafilm.cz
# egress PATH MTU, which is BELOW ~1440B on the wire (NOT GCP's 1460 VPC MTU —
# that was the wrong assumption in ADR 0074). onetun caps the inner IP packet at
# this value (lib.rs passes it to smoltcp's DeviceCapabilities); WireGuard then
# adds ~60B, so the wire packet is ONETUN_MTU + 60. Any value whose wire packet
# exceeds the path MTU is silently DROPPED outbound, black-holing every request
# that spans more than one TCP segment (CatDV writeback PUTs AND any body/query
# > ~1 segment) while reads/logins (sub-segment) still work. 1380 (~1440B wire)
# STILL black-holed; 1000 (~1060B wire) verified working via an outbound
# size-sweep probe on 2026-06-11 (q=1400/2000/3000 went 60s-timeout -> sub-second
# 200). Throughput is irrelevant here (tunnel carries only small CatDV REST;
# proxy media comes from GCS), so the low MTU costs nothing. See ADR 0076
# (corrects ADR 0074's "peer-key collision" root cause).
ONETUN_MTU: "1000"
# Cloud uses the AI store (GCS) as the only proxy-media cache; local disk
# is ephemeral. Cache writes upload to GCS; playback redirects to signed
# URLs. See docs/specs/2026-06-10-cloud-media-cache-ai-store-design.md.
MEDIA_CACHE: "ai_store"
# IAP access control. Mirrors deploy/staging.env.yaml; see
# docs/specs/2026-06-13-iap-access-control-design.md.
#   * AUTH_BACKEND=iap — REQUIRED in cloud: settings.py refuses to boot when
#     APP_ENV=prod and this isn't "iap" (fail-closed; never run the local `dev`
#     header-trusting shim in prod).
#   * IAP_AUDIENCE — the direct-Cloud-Run-IAP JWT audience the adapter verifies
#     the signed assertion against (format /projects/<NUM>/locations/<REGION>/
#     services/<SVC>). If wrong, the adapter fails closed and logs the real aud.
AUTH_BACKEND: "iap"
IAP_AUDIENCE: "/projects/204842536530/locations/europe-west3/services/catdv-annotator"
# Seeded as admin(s) at startup (idempotent) so the admin console has an owner;
# everyone else who passes IAP starts unroled (default-deny → request-access).
# Comma-separated SINGLE string. The IAP edge is bound to allAuthenticatedUsers
# (ADR 0113 / deploy/README.md), so these just need to be valid Google accounts;
# all per-user management happens in /admin, not the console.
ADMIN_EMAILS: "adam.tomas.barta@gmail.com,peter.hora@gmail.com,soltandpepar@gmail.com"

# Non-secret prod config for Cloud Run (gcloud run deploy --env-vars-file).
# Secrets (CATDV_PASSWORD, GEMINI_API_KEY, later WG_PRIVATE_KEY) are
# injected via --set-secrets in .github/workflows/deploy.yml -- never here.
# All values must be YAML strings.
APP_ENV: "prod"
DATA_DIR: "/data"
# Flipped to "false" in phase 3 when the WireGuard tunnel lands.
CATDV_OFFLINE: "false"
# Manual connect-on-demand: boot disconnected (no seat); the operator
# clicks Connect to spend a seat and Disconnect to release it. See ADR 0068.
CATDV_CONNECT_MODE: "manual"
# CatDV is reached through the onetun local forward (phase 3).
CATDV_BASE_URL: "http://127.0.0.1:18080"
CATDV_USERNAME: "klientAI"
CATDV_CATALOG_ID: "881507"
GCP_PROJECT_ID: "catdav"
# Matches the working local .env -- Gemini model availability is
# region-bound; do not change as part of deployment.
GCP_LOCATION: "global"
GCS_BUCKET_NAME: "catdav-proxies"
ARCHIVE_PROVIDER: "catdv"
AI_INPUT_STORE: "gcs"
# Phase 2: SQLite persistence. DB_PATH must equal
# settings.data_dir / "app.db" (context.py:129).
DB_PATH: "/data/app.db"
LITESTREAM_REPLICA_URL: "gcs://catdv-annotator-db/litestream"
# Phase 3: onetun userspace WireGuard (consumed by entrypoint.sh, not Settings).
# Values from the pragafilm office WireGuard peer config. WG_PRIVATE_KEY is
# the matching secret (wg-private-key). NOTE: this reuses an existing personal
# peer key, so the cloud tunnel and that Mac's tunnel cannot be up at the same
# time (one endpoint per peer key). A dedicated least-privilege cloud peer
# (AllowedIPs=192.168.1.41/32) is the eventual hardening — see deploy/README.md.
WG_ENDPOINT: "gw.pragafilm.cz:51820"
WG_PEER_PUBKEY: "ZM3v8CC14zaPnwuHDsXM/hGifyof4vPEVqsfgdMFSEs="
WG_SOURCE_IP: "192.168.3.5"
# onetun tunnel MTU. Default 1420 is too large on GCP: WireGuard overhead
# (~60B) pushes packets to ~1480B, over GCP's 1460 VPC MTU, which DROPS
# (does not fragment) the oversized packets. That silently black-holes the
# bulk-egress direction — i.e. the CatDV writeback PUT bodies — while reads
# and logins (sub-MTU) still work. 1380 = 1460 - 80. See ADR 0074.
ONETUN_MTU: "1380"
# Cloud uses the AI store (GCS) as the only proxy-media cache; local disk
# is ephemeral. Cache writes upload to GCS; playback redirects to signed
# URLs. See docs/specs/2026-06-10-cloud-media-cache-ai-store-design.md.
MEDIA_CACHE: "ai_store"

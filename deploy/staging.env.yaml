# Non-secret config for the STAGING Cloud Run service (catdv-annotator-staging).
#
# Staging exists to test cloud + IAP behaviour from any branch WITHOUT pushing to
# main and WITHOUT touching the production service. It is deliberately isolated
# from production's shared singletons (see deploy/README.md "Staging" and ADRs
# 0066/0077/0104/0105):
#   * LITESTREAM_REPLICA_URL — staging has its OWN replica path
#                              (gcs://catdv-annotator-db/staging), distinct from
#                              prod's .../litestream. The DB is PERSISTED across
#                              cold starts (ADR 0105). The paths MUST stay
#                              distinct: two Litestream writers on one path =
#                              corruption. Requires --no-cpu-throttling so
#                              Litestream flushes between requests + on teardown.
#   * AUTH_BACKEND=iap          — exercises the real Google IAP identity path.
#   * INSTANCE_ID=staging       — uploaded-clip media namespaced away from prod.
# VPN/CatDV: ENABLED for end-to-end testing (ADR 0104), but connect-on-demand
# (CATDV_CONNECT_MODE=manual) so a seat is only spent when an operator clicks
# Connect and released on idle. Staging reuses PROD's WireGuard peer key, so the
# staging and prod tunnels are MUTUALLY EXCLUSIVE (one peer key = one live
# endpoint): bringing staging's tunnel up will drop prod's, and vice versa.
# Connect one environment at a time. Staging talks to the SAME CatDV catalog
# (881507) as prod — write-backs from staging hit real CatDV data.
# Scales to zero (min-instances=0) → ~no cost when idle.
APP_ENV: "prod"
DATA_DIR: "/data"
DB_PATH: "/data/app.db"
# Persist the staging SQLite DB across cold starts. Distinct prefix from prod's
# gcs://catdv-annotator-db/litestream (NEVER share — two writers = corruption).
# Same bucket + runtime SA (already has access). entrypoint.sh restores from
# here on boot and runs `litestream replicate`. See ADR 0105.
LITESTREAM_REPLICA_URL: "gcs://catdv-annotator-db/staging"
# Per-deployment identifier (mandatory; issue #55). MUST differ from prod
# ("prod") so staging uploads land under instances/staging/ and never
# overwrite prod media in the shared catdv-proxies bucket.
INSTANCE_ID: "staging"
# CatDV reachable over the WireGuard tunnel (ADR 0104). Connect-on-demand:
# boots disconnected (no seat); operator clicks Connect to spend a seat,
# idle-logout (catdv_idle_logout_s) releases it. Reached through the onetun
# local forward, same as prod.
CATDV_OFFLINE: "false"
CATDV_CONNECT_MODE: "manual"
CATDV_BASE_URL: "http://127.0.0.1:18080"
CATDV_USERNAME: "klientAI"
CATDV_CATALOG_ID: "881507"
GCP_PROJECT_ID: "catdav"
GCP_LOCATION: "global"
GCS_BUCKET_NAME: "catdv-proxies"
ARCHIVE_PROVIDER: "catdv"
AI_INPUT_STORE: "gcs"
MEDIA_CACHE: "ai_store"
# WireGuard / onetun — REUSES PROD'S peer key (WG_PRIVATE_KEY=wg-private-key
# secret, injected by CI). Same endpoint/peer/source-IP as prod, so the staging
# and prod tunnels cannot be up simultaneously (see header). ONETUN_MTU=1000 is
# the path-MTU-safe value verified for the Cloud Run→gw egress (ADR 0076);
# staging shares that egress path so it uses the same value.
WG_ENDPOINT: "gw.pragafilm.cz:51820"
WG_PEER_PUBKEY: "ZM3v8CC14zaPnwuHDsXM/hGifyof4vPEVqsfgdMFSEs="
WG_SOURCE_IP: "192.168.3.5"
ONETUN_MTU: "1000"
# Real IAP identity path. IAP_AUDIENCE is discovered from a live token on this
# service (see deploy/README.md "Staging"), then filled in here. Until it is set,
# the iap backend establishes no identity (fails closed) but the app still runs.
AUTH_BACKEND: "iap"
# Discovered from a live staging token (format: /projects/<NUM>/locations/<REGION>/services/<SVC>).
IAP_AUDIENCE: "/projects/204842536530/locations/europe-west3/services/catdv-annotator-staging"
# Seeded as admin(s) at startup (idempotent) so the admin console has an owner
# before anyone can use it (ADR 0085). Comma-separated; edit to taste. Everyone
# else who passes IAP starts unroled (default-deny → the access page, where they
# can Request access). Must be a Google account that's also IAP-allow-listed.
ADMIN_EMAILS: "adam.tomas.barta@gmail.com,peter.hora@gmail.com,soltandpepar@gmail.com"

{# Left rail of the Studio landing page: testbench list with active highlight. #}
<aside class="studio-rail" x-data>
  <header class="studio-rail__header">
    <h2>Testbenches</h2>
    <button class="btn-add" @click="$dispatch('open-add-testbench')" title="New testbench">+</button>
  </header>
  <ul class="studio-rail__list">
    {% for tb in testbenches %}
      <li class="{% if selected and selected.id == tb.id %}active{% endif %}">
        <a href="/studio/testbenches/{{ tb.id }}">{{ tb.name }}</a>
      </li>
    {% endfor %}
  </ul>
</aside>

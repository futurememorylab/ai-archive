{# Minimal wrapper around the existing media route. The <video> mounts on
   the same URL the clip detail / cache views use; transport, scrubbing
   and timeline behavior are unchanged. PR2 will layer marker overlays on
   top of this. #}
<div class="studio-player" data-clip-player data-clip-id="{{ clip_id }}">
  <video controls preload="metadata"
         src="/api/media/{{ clip_id }}"
         style="width: 100%; max-height: 320px; background: #000;"></video>
</div>

<tr data-item-id="{{ it.id }}" data-status="{{ it.status }}">
  <td>#{{ it.testbench_item_id }}</td>
  <td><span class="status status--{{ it.status }}">{{ it.status }}</span></td>
  <td>{{ it.latency_ms or "—" }}</td>
  <td>
    {% if it.unacceptable_reason %}<em class="muted">{{ it.unacceptable_reason }}</em>
    {% elif it.error %}<em class="error">{{ it.error }}</em>
    {% elif it.structured_json %}<code>{{ it.structured_json[:120] }}…</code>
    {% else %}—{% endif %}
  </td>
</tr>

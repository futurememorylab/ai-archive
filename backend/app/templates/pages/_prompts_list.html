{% if prompts %}
  {% for p in prompts %}
    <a class="tmpl-row{% if selected and selected.id == p.id %} selected{% endif %}"
       href="/prompts/{{ p.id }}">
      <div>
        <div class="name">
          {{ p.name }}
          {% if p.media_kind and p.media_kind != "any" %}
            <span class="tag" style="margin-left: 6px;">{{ p.media_kind }}</span>
          {% endif %}
        </div>
        <div class="desc">{{ p.description or "" }}</div>
      </div>
    </a>
  {% endfor %}
{% else %}
  <div class="empty-state">No prompts yet</div>
{% endif %}

<div class="popover">
  <button type="button"
          class="btn primary"
          :disabled="running"
          @click="toggleOpen()">
    <span x-show="!running">Annotate</span>
    <span x-show="running" x-cloak class="ca-running">
      <span class="ca-spinner" aria-hidden="true"></span>
      <span x-text="phase === 'caching' ? ('Caching' + (cachePct !== null ? ' ' + cachePct + '%' : '')) : phase === 'annotating' ? 'Annotating' : 'Starting'"></span>
      <span class="mono" x-text="runElapsed">0:00</span>
    </span>
  </button>

  <div class="popover-panel menu align-right" x-show="open" x-cloak
       @click.outside="open = false" @keydown.escape.window="open = false">
    <template x-if="loading">
      <p class="muted">Loading prompts…</p>
    </template>
    <template x-if="!loading && error">
      <p class="error" x-text="error"></p>
    </template>
    <template x-if="!loading && !error && prompts && prompts.length === 0">
      <p class="muted">
        No production prompts.
        <a href="/prompts">Open Prompts</a> to create one.
      </p>
    </template>
    <template x-if="!loading && prompts && prompts.length > 0">
      <template x-for="p in prompts" :key="p.id">
        <button type="button" class="menu-item" @click="pick(p)">
          <span class="menu-lbl" x-text="p.name"></span>
          <span class="menu-meta">
            <span x-show="p.media_kind && p.media_kind !== 'any'"
                  class="tag" x-text="p.media_kind"></span>
            v<span x-text="p.current_production_version_num"></span>
          </span>
        </button>
      </template>
    </template>
  </div>
</div>
